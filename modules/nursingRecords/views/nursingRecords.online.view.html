<!-- ================= SEARCH ================= -->
<div class="col-10 mx-auto mb-3 mt-4">
  <div class="col-6 mx-auto mb-3 mt-4 position-relative">
    <div class="input-group">
      <span class="input-group-text" style="font-size:10px;">🔍</span>
      <input type="text" id="patientSearch" class="form-control" autocomplete="off" style="font-size:12px;" >
      <button type="button" class="btn btn-primary" id="btnSearchPatient" style="font-size:12px;">
        ค้นหา
      </button>
    </div>

    <div id="searchResults"
         class="list-group w-100"
         style="position:absolute; top:100%; z-index:1000; display:none;">
    </div>
  </div>
</div>

<!-- ================= FORM ================= -->
<form id="nursingForm" class="row g-3">
            <!-- Basic Info -->
            <div class="col-md-2" >
              <label style="font-size:10px;" class="form-label mb-0">NSR No.</label>
              <input style="font-size:10px;" type="text" class="form-control" id="NSR" name="NSR" readonly>
            </div>
            <div class="col-md-2" hidden>
              <label class="form-label mb-0">วันที่บันทึกข้อมูล</label>
              <input type="text" class="form-control" id="Stamp" name="Stamp">
            </div>
            <div class="col-md-2">
              <label style="font-size:10px;" class="form-label mb-0">HN</label>
              <input style="font-size:10px;" type="text" class="form-control" id="HN" name="HN">
            </div>
            <div class="col-md-2">
              <label style="font-size:10px;"class="form-label mb-0">เลขบัตรประชาชน</label>
              <input style="font-size:10px;"type="text" class="form-control" id="CID" name="CID">
            </div>
            <div class="col-md-2" hidden>
              <label style="font-size:10px;"class="form-label mb-0">คำนำหน้า</label>

            </div>

              <label style="font-size:10px;"class="form-label mb-0">ชื่อผู้รับบริการ</label>

            </div>
            <div class="col-md-2">
              <label style="font-size:10px;"class="form-label mb-0">นามสกุล</label>
              <input style="font-size:10px;"type="text" class="form-control" id="LNAME" name="LNAME">
            </div>
            <div class="col-md-2" hidden>
              <label style="font-size:10px;"class="form-label mb-0">วันเกิด</label>
              <input style="font-size:10px;"type="text" class="form-control" id="BIRTH" name="BIRTH">
            </div>
            <div class="col-md-2">
              <label style="font-size:10px;"class="form-label mb-0">เบอร์โทรศัพท์</label>
              <input style="font-size:10px;"type="text" class="form-control" id="TELEPHONE" name="TELEPHONE">
            </div>
            <div class="col-md-2">
              <label style="font-size:10px;"class="form-label mb-0">วันที่ให้บริการ</label>
              <input style="font-size:10px;"type="date" class="form-control" id="DateService" name="DateService">
            </div>
            <div class="col-md-5">
              <label style="font-size:10px;"class="form-label mb-0">กิจกรรมทางการพยาบาล</label>
              <input style="font-size:10px;"type="text" class="form-control" id="Activity" name="Activity">
            </div>
            <div class="col-md-5">
              <label style="font-size:10px;"class="form-label mb-0">วัตถุประสงค์</label>
              <input style="font-size:10px;"type="text" class="form-control" id="Objective" name="Objective">
            </div>
            <div class="col-6">
              <label style="font-size:10px;" class="form-label mb-0">ข้อมูลสุขภาพ</label>
              <textarea style="font-size:10px;"class="form-control"id="HealthInform"name="HealthInform"rows="2"data-type="inform"></textarea>
            </div>
            <div class="col-6">
              <label style="font-size:10px;" class="form-label mb-0">การให้คำแนะนำ</label>
              <textarea style="font-size:10px;"class="form-control"id="HealthAdvice"name="HealthAdvice"rows="2"data-type="advice"></textarea>
            </div>
            <div class="col-12">
              <label style="font-size:10px;" class="form-label mb-0">ไฟล์แนบ (Google Drive URL)</label>
              <input
                style="font-size:10px;"
                type="text"
                class="form-control"
                id="fileURL"
                name="fileURL"
                placeholder="https://drive.google.com/file/d/xxxxx/view"

            </div>
