<!-- =================================================
  modules/patients/patients.view.html
  PATIENTS VIEW (UPLOAD + MANUAL SAVE DIRECT)
================================================= -->

<!-- ===============================
 MODE SELECT
================================ -->
<div class="card shadow border-0 p-3 mb-3 text-center">
  <div class="btn-group">
    <button class="btn btn-outline-primary btn-sm" id="btnModeUpload">
      📤 อัปโหลดไฟล์
    </button>
    <button class="btn btn-outline-secondary btn-sm" id="btnModeManual">
      ✍️ ลงข้อมูลเอง
    </button>
  </div>
</div>

<!-- ===============================
 SECTION 1 : Upload File
================================ -->
<div id="uploadSection" class="card shadow-lg border-0 p-3 mb-3">
  <h6 class="text-center" style="font-size:14px">
    📤 อัปโหลดรายชื่อผู้รับบริการ
  </h6>

  <div class="text-center">
    <input type="file"
           id="patientsTxtFile"
           accept=".txt"
           class="form-control mx-auto"
           style="font-size:14px; max-width:400px">

    <small id="fileName"
           class="text-muted d-block mt-1">
      ยังไม่ได้เลือกไฟล์
    </small>
  </div>

  <small class="text-muted d-block text-center mt-2">
    ระบบจะอ่านไฟล์ทันที (ไม่อัปโหลดไฟล์)
  </small>
</div>

<!-- ===============================
 SECTION : MANUAL ENTRY (CLINIC UI)
================================ -->
<div id="manualSection"
     class="card border-0 shadow rounded-4 p-4 mb-4 d-none"
     style="background: linear-gradient(180deg,#ffffff,#f4f8ff);">

  <!-- Header -->
  <div class="d-flex align-items-center mb-3">
    <div class="me-3 fs-3">🩺</div>
    <div>
      <h5 class="mb-0 fw-bold text-primary">ลงข้อมูลผู้รับบริการ</h5>
      <small class="text-muted">กรณีค้นหาไม่พบในระบบ</small>
    </div>
  </div>

  <hr class="mt-2 mb-4">

  <div class="row g-3">

    <!-- Citizen ID -->
    <div class="col-md-4">
      <label class="form-label small text-muted">เลขบัตรประชาชน *</label>
      <input type="text"
             id="manualCid"
             maxlength="13"
             class="form-control form-control-sm rounded-3"
             placeholder="กรอก 13 หลัก">
    </div>

    <!-- HN -->
    <div class="col-md-4">
      <label class="form-label small text-muted">HN</label>
      <input type="text"
             id="manualHN"
             class="form-control form-control-sm rounded-3"
             placeholder="Hospital Number">
    </div>

    <!-- PRENAME -->
    <div class="col-md-4">
      <label class="form-label small text-muted">คำนำหน้า</label>
      <select id="manualPrename"
        class="form-select form-select-sm rounded-3">
        <option value="">-- เลือก --</option>
        <option value="1">ด.ช.</option>
        <option value="2">ด.ญ.</option>
        <option value="3">นาย</option>
        <option value="4">น.ส.</option>
        <option value="5">นาง</option>
      </select>
    </div>

    <!-- Name -->
    <div class="col-md-4">
      <label class="form-label small text-muted">ชื่อ *</label>
      <input type="text"
             id="manualName"
             class="form-control form-control-sm rounded-3"
             placeholder="ชื่อ">
    </div>

    <!-- Surname -->
    <div class="col-md-4">
      <label class="form-label small text-muted">นามสกุล *</label>
      <input type="text"
             id="manualSurname"
             class="form-control form-control-sm rounded-3"
             placeholder="นามสกุล">
    </div>

    <!-- SEX -->
    <div class="col-md-4">
      <label class="form-label small text-muted d-block">เพศ</label>
      <div class="form-check form-check-inline">
        <input class="form-check-input"
               type="radio"
               name="manualSex"
               value="M">
        <label class="form-check-label small">ชาย</label>
      </div>
      <div class="form-check form-check-inline">
        <input class="form-check-input"
               type="radio"
               name="manualSex"
               value="F">
        <label class="form-check-label small">หญิง</label>
      </div>
    </div>

    <!-- Birthdate -->
    <div class="col-md-4">
      <label class="form-label small text-muted">วันเกิด</label>
      <input type="date"
             id="manualBirth"
             class="form-control form-control-sm rounded-3">
    </div>

    <!-- Telephone -->
    <div class="col-md-4">
      <label class="form-label small text-muted">โทรศัพท์บ้าน</label>
      <input type="text"
             id="manualTelephone"
             class="form-control form-control-sm rounded-3"
             placeholder="038-xxx-xxx">
    </div>

    <!-- Mobile -->
    <div class="col-md-4">
      <label class="form-label small text-muted">มือถือ</label>
      <input type="text"
             id="manualMobile"
             class="form-control form-control-sm rounded-3"
             placeholder="08x-xxx-xxxx">
    </div>

    <!-- Submit Button -->
    <div class="col-12 mt-3">
      <button class="btn btn-primary w-100 rounded-3 shadow-sm fw-semibold"
              id="btnAddManual">
        💾 บันทึกข้อมูลผู้รับบริการ
      </button>
    </div>

  </div>
</div>
<!-- ===============================
 SECTION 2 : Search
================================ -->
<div id="searchSection"
     class="card shadow border-0 p-3 mt-3 d-none"
     style="font-size:14px">

  <input style="font-size:14px"
         type="text"
         id="patientsSearch"
         class="form-control"
         placeholder="ค้นหา CID / ชื่อ / นามสกุล">

  <div style="font-size:14px"
       id="patientsImportCounter"
       class="small text-muted mt-2">
  </div>
</div>

<!-- ===============================
 SECTION 3 : Preview Table
================================ -->
<div id="previewSection"
     class="card shadow border-0 p-3 mt-3 d-none">

  <h6 class="text-center">
    📋 กรุณาเลือกเฉพาะที่ต้องการ
  </h6>

  <div class="text-center mt-3 mb-3">
    <button class="btn btn-success btn-sm"
            id="btnSavePatients">
      💾 บันทึกเฉพาะที่เลือก
    </button>
  </div>

  <div class="table-responsive">
    <table class="table table-bordered table-sm">
      <thead>
        <tr>
          <th style="width:40px;" class="text-center">
            <input type="checkbox" id="checkAll">
          </th>
          <th>Citizen Identification</th>
          <th>Name - Surname</th>
          <th>Birth Date</th>
          <th>Telephone</th>
        </tr>
      </thead>
      <tbody id="patientsImportBody"
             style="font-size:14px">
      </tbody>
    </table>
  </div>
</div>
