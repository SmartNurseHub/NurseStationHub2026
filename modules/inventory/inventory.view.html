<div class="container py-3">

  <!-- HEADER -->
  <div class="card shadow-sm border-0 mb-3" style="border-radius:16px;">
    <div class="card-body d-flex align-items-center justify-content-between">
      <div>
        <h4 class="fw-bold mb-1">📦 ระบบตรวจสอบอุปกรณ์</h4>
        <p class="text-muted mb-0 small">
          ตรวจสอบความพร้อมของเวชภัณฑ์และอุปกรณ์ฉุกเฉิน
        </p>
      </div>
    </div>
  </div>

  <!-- MENU -->
  <div class="d-flex justify-content-center mb-3">
  <div class="btn-group">

    <!-- 1. บันทึกข้อมูล -->
    <div class="dropdown me-2">
      <button class="btn dropdown-toggle"
        style="background-color:#006666;color:#fff;font-size:12px;"
        data-bs-toggle="dropdown">
        📥 การบันทึกข้อมูล
      </button>

      <ul class="dropdown-menu">

        <li>
          <a href="#" class="dropdown-item"
            style="font-size:12px;"
            onclick="startScan()">
            📷 บันทึกด้วย QR CODE
          </a>
        </li>

        <li>
          <a href="#" class="dropdown-item"
            style="font-size:12px;"
            onclick="openChecklist()">
            ☑️ บันทึกด้วย Check List
          </a>
        </li>

      </ul>
    </div>

    <!-- 2. บริหารจัดการ -->
    <div class="dropdown me-2">
      <button class="btn dropdown-toggle"
        style="background-color:#006666;color:#fff;font-size:12px;"
        data-bs-toggle="dropdown">
        ⚙️ การบริหารจัดการ
      </button>

      <ul class="dropdown-menu">

        <li>
          <a href="#" class="dropdown-item"
            style="font-size:12px;"
            onclick="openMaster()">
            📦กำหนดรายการสต๊อก
          </a>
        </li>
        <li>
          <a href="#" class="dropdown-item"
            style="font-size:12px;"
            onclick="openStock()">
            📦ประวัติรับเข้า-จำหน่าย
          </a>
        </li>

      </ul>
    </div>

    <!-- 3. รายงาน -->
    <div class="dropdown">
      <button class="btn dropdown-toggle"
        style="background-color:#006666;color:#fff;font-size:12px;"
        data-bs-toggle="dropdown">
        📊 รายงาน
      </button>
    </div>

  </div>
</div>


  <!-- DASHBOARD -->
  <div id="dashboard-card" class="card shadow-sm border-0" style="border-radius:16px;">
  <div class="card-body">

    <div class="d-flex justify-content-between align-items-center mb-2">
      <h6 class="fw-bold mb-0">📊 Dashboard</h6>
      <button class="btn btn-sm btn-outline-primary" onclick="loadSummary()">
        Refresh
      </button>
    </div>

    <table class="table table-sm table-bordered align-middle">
      <thead class="table-light">
        <tr>
          <th>Item Id</th>
          <th>Item List</th>
          <th>Required Qty</th>
          <th>Current Qty</th>
          <th>Detail</th>
        </tr>
      </thead>
      <tbody id="dash-body"></tbody>
    </table>

  </div>
</div>
    
  <div id="content-area"></div>

</div>

<script src="https://unpkg.com/html5-qrcode"></script>
