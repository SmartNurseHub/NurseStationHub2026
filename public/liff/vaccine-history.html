<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>ประวัติวัคซีน</title>

<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>

<style>
body{
  font-family: Arial, sans-serif;
  margin:20px;
}

h2{
  color:#006666;
}

.card{
  border:1px solid #ddd;
  border-radius:10px;
  padding:12px;
  margin-bottom:10px;
  background:#fafafa;
}
</style>

</head>

<body>

<h2>📜 ประวัติวัคซีน</h2>

<div id="history">กำลังโหลด...</div>

<script>
function formatDate(date){
  const d = new Date(date);
  return d.toLocaleDateString("th-TH",{
    year:"numeric",
    month:"short",
    day:"numeric"
  });

}

async function init(){

  try{

    // init LIFF
    await liff.init({ liffId:"2007902507-SCwT4XsP" });

    if(!liff.isLoggedIn()){
      liff.login();
      return;
    }

    // LINE profile
    const profile = await liff.getProfile();

    // รับ CID จาก URL
    const params = new URLSearchParams(window.location.search);
    const cid = params.get("cid");

    if(!cid){
      document.getElementById("history").innerHTML="❌ ไม่พบ CID";
      return;
    }

    // เรียก API แบบ secure
    const res = await fetch(
      `/api/vaccination/history-secure/${cid}/${profile.userId}`
    );

    const data = await res.json();

    if(data.error){
      document.getElementById("history").innerHTML="❌ ไม่มีสิทธิ์เข้าถึงข้อมูล";
      return;
    }

    render(data);

  }catch(err){

    console.error(err);

    document.getElementById("history").innerHTML =
      "❌ เกิดข้อผิดพลาดในการโหลดข้อมูล";

  }

}

function render(list){

  const el = document.getElementById("history");

  el.innerHTML = "";

  if(!list || list.length === 0){
    el.innerHTML = "ไม่พบประวัติวัคซีน";
    return;
  }

  list.forEach(v=>{

    const div = document.createElement("div");

    div.className = "card";

    div.innerHTML = `
  📅 ${formatDate(v.dateService)}<br>
  💉 <b>${v.TH_Name} (${v.name})</b> เข็มที่ ${v.doseNo}<br>
  👩‍⚕️ ผู้ให้บริการ ${v.providerName || "-"}<br>
  🏥 สถานที่ ${v.locationType || "-"}
`;

el.appendChild(div);

  });

}

init();

</script>

</body>
</html>
