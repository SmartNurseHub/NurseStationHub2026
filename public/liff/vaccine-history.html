<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>ประวัติวัคซีน</title>

<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>

<style>
body{
  font-family: Arial, sans-serif;
  margin:20px;
}

h2{
  color:#006666;
}

.card{
  border:1px solid #ddd;
  border-radius:10px;
  padding:12px;
  margin-bottom:10px;
  background:#fafafa;
}
</style>

</head>

<body>

<h2>📜 ประวัติวัคซีน</h2>

<div id="history"></div>

<script>

async function init(){

  await liff.init({ liffId:"2007902507-vaccine-history" });

  if(!liff.isLoggedIn()){
    liff.login();
    return;
  }

  const profile = await liff.getProfile();

  const res = await fetch(`/api/vaccine/history/${profile.userId}`);

  const data = await res.json();

  render(data);

}

function render(list){

  const el = document.getElementById("history");

  el.innerHTML = "";

  if(!list || list.length === 0){
    el.innerHTML = "ไม่พบประวัติวัคซีน";
    return;
  }

  list.forEach(v=>{

    const div = document.createElement("div");

    div.className = "card";

    div.innerHTML = `
      💉 <b>${v.vaccineCode}</b><br>
      เข็มที่ ${v.doseNo}<br>
      📅 ${v.dateService}
    `;

    el.appendChild(div);

  });

}

init();

</script>

</body>
</html>
