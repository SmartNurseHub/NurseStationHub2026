<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>เลื่อนนัดวัคซีน</title>
<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
</head>

<body>

<h2>📅 เลื่อนนัดวัคซีน</h2>

<label>วันนัดใหม่</label>
<input type="date" id="newDate">

<br><br>

<button onclick="submitReschedule()">ยืนยันเลื่อนนัด</button>

<script>

async function init(){

  await liff.init({ liffId: "2007902507-reschedule" });

}

init();

async function submitReschedule(){

  const urlParams = new URLSearchParams(window.location.search);
  const apid = urlParams.get("apid");

  const profile = await liff.getProfile();

  const newDate = document.getElementById("newDate").value;

  await fetch("/api/vaccine/reschedule",{

    method:"POST",
    headers:{
      "Content-Type":"application/json"
    },

    body: JSON.stringify({

      apid,
      lineUid: profile.userId,
      newDate

    })

  });

  alert("บันทึกการเลื่อนนัดเรียบร้อย");

  liff.closeWindow();

}

</script>

</body>
</html>
